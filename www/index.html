<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  
  <title>Nutrium - Macro & Workout Tracker</title>
  <meta name="description" content="The minimalist, aesthetic nutrition and workout tracker for the fluffy ones.">
  
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nutrium">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  
  <!-- FONTS & ICONS (CDN - cached after first load for offline use) -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- APP STYLES -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <header id="app-header">
    <div style="font-weight:800;font-size:17px;letter-spacing:-.5px">Nutrium</div>
    <div id="header-date" style="font-size:12px;color:var(--muted);font-weight:500"></div>
  </header>
  
  <div id="view-onboarding" class="view"></div>

  <main id="app-main">
    <div id="view-today" class="view"></div>
    <div id="view-food" class="view"></div>
    <div id="view-train" class="view"></div>
    <div id="view-you" class="view"></div>
  </main>
  
  <nav id="bottom-nav">
    <button class="nav-item active" data-view="today" aria-label="Today"><i class="fa-solid fa-house"></i><span>Today</span></button>
    <button class="nav-item" data-view="food" aria-label="Food"><i class="fa-solid fa-utensils"></i><span>Noms</span></button>
    <button class="nav-item" data-view="train" aria-label="Train"><i class="fa-solid fa-dumbbell"></i><span>Sweat</span></button>
    <button class="nav-item" data-view="you" aria-label="You"><i class="fa-solid fa-paw"></i><span>Den</span></button>
  </nav>
</div>

<div id="modal-overlay" class="modal-overlay"></div>
<div id="modal-sheet" class="modal-sheet">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <h3 id="modal-title" style="font-weight:700;font-size:15px"></h3>
    <button id="modal-close" class="btn-icon" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div id="modal-body" class="modal-body"></div>
</div>
<div id="toast" class="toast"></div>

<!-- SCRIPTS -->
<script src="capacitor.js"></script>
<script src="assets/vendor/js/chart.min.js"></script>
<script src="app.js"></script>

</body>
</html>
